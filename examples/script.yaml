# Example script backing the invoice-download dashboard tiles (see
# dashboard.yaml). A dashboard tap_action's own `data:` fields are NOT
# templated - a Jinja expression there is sent to the service literally, as
# text, which fails since the service expects a real invoice ID. Scripts (and
# automations) DO template their action data, so the templating has to live
# here rather than in the tile itself.
#
# To use: Settings -> Automations & scenes -> Scripts -> top-right menu ->
# Edit in YAML, paste this in (or merge it with what's already there).

download_vafab_invoice:
  alias: "Download VafabMiljö invoice"
  fields:
    invoice_index:
      description: >-
        Position in the invoices list, most recent first - 0 (the default)
        is the latest invoice, 1 is the one before that, and so on. Pass
        this from a dashboard tile to let a tap download an older invoice
        instead of always the latest.
      example: 0
      default: 0
  sequence:
    - action: vafabmiljo.download_invoice
      data:
        invoice_id: >-
          {{ state_attr('sensor.exempelgatan_1_exempelstad_latest_invoice', 'invoices')[(invoice_index | default(0)) | int(0)].id }}
      response_variable: result
    # The service call above succeeds silently - fine on a desktop browser
    # where you can watch the tile, but from the phone app tapping the tile
    # looks like nothing happened at all. A notification with a direct link
    # gives it something to tap.
    #
    # Use the legacy per-device notify.<device> service (e.g.
    # notify.mobile_app_your_phone), not notify.send_message - the newer
    # entity-based notify.send_message action (post-2024.11 notify platform
    # migration) only accepts message/title, and rejects a nested `data:`
    # sub-key ("extra keys not allowed @ data['data']"), which is what
    # carries the tap-to-open URL for the companion app. The old per-device
    # service is still registered alongside the new entity and does accept
    # it - confirmed live. Find your exact service name under Settings ->
    # People -> your user, or Developer Tools -> Actions.
    #
    # `result.path` is relative (e.g. /local/vafabmiljo/<name>.pdf) - the
    # companion app resolves that against whatever server it's connected to,
    # which is normally what you want. If tapping the notification doesn't
    # open it, use the full external URL instead, e.g.
    # "https://your-ha-domain{{ result.path }}".
    - action: notify.mobile_app_your_phone
      data:
        title: "Invoice ready"
        message: "Tap to open the PDF (deleted in 10 minutes)"
        data:
          url: "{{ result.path }}"
  mode: single
