# Example Lovelace dashboard for the VafabMiljö integration.
#
# Home Assistant derives entity IDs from your address, so the ones below
# (based on "Exempelgatan 1, Exempelstad") won't match yours as-is. Find your
# real ones under Settings -> Devices & services -> VafabMiljö -> your
# address -> Entities, then replace the `exempelgatan_1_exempelstad` part.
#
# To use: Settings -> Dashboards -> Add dashboard -> Take control -> paste
# this in the YAML editor (top-right menu -> Edit in YAML).

title: VafabMiljö
views:
  - title: Waste collection
    path: vafabmiljo
    cards:
      - type: entities
        title: Next pickup
        entities:
          - entity: sensor.exempelgatan_1_exempelstad_matavfall
          - entity: sensor.exempelgatan_1_exempelstad_restavfall
          - entity: sensor.exempelgatan_1_exempelstad_plast_och_papper

      - type: entities
        title: Put the bins out tonight?
        entities:
          - entity: binary_sensor.exempelgatan_1_exempelstad_matavfall_tomorrow
          - entity: binary_sensor.exempelgatan_1_exempelstad_restavfall_tomorrow
          - entity: binary_sensor.exempelgatan_1_exempelstad_plast_och_papper_tomorrow

      - type: entities
        title: Notifications
        entities:
          - entity: switch.exempelgatan_1_exempelstad_waste_pickup_notifications
          - entity: switch.exempelgatan_1_exempelstad_operational_information_notifications
          - entity: switch.exempelgatan_1_exempelstad_news_notifications
          - entity: time.exempelgatan_1_exempelstad_reminder_time
          - entity: time.exempelgatan_1_exempelstad_notification_time

      # Everything below needs BankID connected (see the README) - remove
      # this card if you skipped that during setup.
      - type: entities
        title: Account
        entities:
          - entity: sensor.exempelgatan_1_exempelstad_latest_invoice
          - entity: sensor.exempelgatan_1_exempelstad_property
          - entity: binary_sensor.exempelgatan_1_exempelstad_bankid_connected

      # Full invoice history, from the "invoices" attribute on the
      # latest-invoice sensor. Built-in markdown card, no custom card needed.
      # See automation.yaml for a button that downloads the latest one.
      - type: markdown
        title: Invoices
        content: >-
          {% for inv in state_attr('sensor.exempelgatan_1_exempelstad_latest_invoice', 'invoices') or [] %}
          - **{{ inv.amount }} kr** ({{ inv.invoice_date }}, due {{ inv.due_date }}) - {{ inv.payment_status }} (id: {{ inv.id }})
          {% endfor %}

      - type: tile
        entity: sensor.exempelgatan_1_exempelstad_latest_invoice
        name: Download latest invoice
        icon: mdi:file-pdf-box
        tap_action:
          action: perform-action
          perform_action: vafabmiljo.download_invoice
          data:
            invoice_id: >-
              {{ state_attr('sensor.exempelgatan_1_exempelstad_latest_invoice', 'invoices')[0].id }}
