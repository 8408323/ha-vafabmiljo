# Example Lovelace dashboard for the VafabMiljö integration.
#
# Home Assistant derives entity IDs from your address, so the ones below
# (based on "Exempelgatan 1, Exempelstad") won't match yours as-is. Find your
# real ones under Settings -> Devices & services -> VafabMiljö -> your
# address -> Entities, then replace the `exempelgatan_1_exempelstad` part.
#
# To use: Settings -> Dashboards -> Add dashboard -> Take control -> paste
# this in the YAML editor (top-right menu -> Edit in YAML).
#
# Card titles/text here are in English - Lovelace doesn't translate
# hand-authored card titles for you (entity names already follow your HA
# language via the integration's own translations), so if you want this in
# Swedish, just edit the strings below.

title: VafabMiljö
views:
  - title: Waste collection
    path: vafabmiljo
    icon: mdi:trash-can-outline
    cards:
      # A one-line "do I need to do anything tonight" summary, so that's
      # answered without reading three separate sensors.
      - type: markdown
        content: >-
          {% set due_tonight = [] %}
          {% if is_state('binary_sensor.exempelgatan_1_exempelstad_matavfall_tomorrow', 'on') %}{% set due_tonight = due_tonight + ['Matavfall'] %}{% endif %}
          {% if is_state('binary_sensor.exempelgatan_1_exempelstad_restavfall_tomorrow', 'on') %}{% set due_tonight = due_tonight + ['Restavfall'] %}{% endif %}
          {% if is_state('binary_sensor.exempelgatan_1_exempelstad_plast_och_papper_tomorrow', 'on') %}{% set due_tonight = due_tonight + ['Plast och papper'] %}{% endif %}
          {% if due_tonight %}
          ## 🗑️ Put out tonight: {{ due_tonight | join(', ') }}
          {% else %}
          ## ✅ Nothing to put out tonight
          {% endif %}

      # One tile per bin type, each with its own icon so the grid reads at a
      # glance instead of as a list of similar-looking rows.
      - type: grid
        columns: 3
        square: false
        cards:
          - type: tile
            entity: sensor.exempelgatan_1_exempelstad_matavfall
            name: Matavfall
            icon: mdi:leaf
          - type: tile
            entity: sensor.exempelgatan_1_exempelstad_restavfall
            name: Restavfall
            icon: mdi:trash-can-outline
          - type: tile
            entity: sensor.exempelgatan_1_exempelstad_plast_och_papper
            name: Plast och papper
            icon: mdi:recycle

      # Same three, but the "due tomorrow" binary sensors - tiles color
      # themselves automatically based on on/off state, so this doubles as
      # the at-a-glance version of the markdown summary above.
      - type: grid
        columns: 3
        square: false
        cards:
          - type: tile
            entity: binary_sensor.exempelgatan_1_exempelstad_matavfall_tomorrow
            name: Matavfall tomorrow
            icon: mdi:leaf
          - type: tile
            entity: binary_sensor.exempelgatan_1_exempelstad_restavfall_tomorrow
            name: Restavfall tomorrow
            icon: mdi:trash-can-outline
          - type: tile
            entity: binary_sensor.exempelgatan_1_exempelstad_plast_och_papper_tomorrow
            name: Plast och papper tomorrow
            icon: mdi:recycle

      - type: entities
        title: Notifications
        icon: mdi:bell-outline
        entities:
          - entity: switch.exempelgatan_1_exempelstad_waste_pickup_notifications
          - entity: switch.exempelgatan_1_exempelstad_operational_information_notifications
          - entity: switch.exempelgatan_1_exempelstad_news_notifications
          - entity: time.exempelgatan_1_exempelstad_reminder_time
          - entity: time.exempelgatan_1_exempelstad_notification_time

      # These control VafabMiljö's own push notifications (server-side, via
      # the switches above). The toggles below are a separate, HA-side
      # layer - who on this dashboard gets pinged by our own automations
      # (see automation.yaml) for a pickup reminder or a new invoice.
      - type: entities
        title: HA notifications (per person)
        icon: mdi:account-alert-outline
        entities:
          - entity: input_boolean.notify_person_a_pickup_reminder
          - entity: input_boolean.notify_person_a_new_invoice
          - entity: input_boolean.notify_person_b_pickup_reminder
          - entity: input_boolean.notify_person_b_new_invoice

      # Everything below needs BankID connected (see the README) - remove
      # these cards if you skipped that during setup.
      - type: entities
        title: Account
        icon: mdi:account-outline
        entities:
          - entity: sensor.exempelgatan_1_exempelstad_latest_invoice
          - entity: sensor.exempelgatan_1_exempelstad_property
          - entity: binary_sensor.exempelgatan_1_exempelstad_bankid_connected

      # Full invoice history, from the "invoices" attribute on the
      # latest-invoice sensor. Built-in markdown card, no custom card needed -
      # a table reads far better here than a flat bullet list, and .split
      # trims the invoice_date/due_date attributes' T00:00:00 time portion,
      # which is always midnight and just clutters a date-only column.
      #
      # `|-` (literal), not `>-` (folded) - folding collapses every line
      # (including the header/separator/each row) into one space-joined
      # paragraph, which is exactly what made this render as unformatted
      # text instead of an actual table/list in the first place.
      #
      # `-%}` on for/endfor (not just `%}`) - HA's template renderer doesn't
      # trim the newline after a block tag by default, so without it every
      # iteration leaves a blank line before its row, which breaks a GFM
      # table into a bunch of disconnected one-row fragments instead of one
      # continuous table.
      - type: markdown
        title: Invoices
        content: |-
          | Amount | Invoiced | Due | Status |
          | --- | --- | --- | --- |
          {% for inv in state_attr('sensor.exempelgatan_1_exempelstad_latest_invoice', 'invoices') or [] -%}
          | {{ inv.amount }} kr | {{ inv.invoice_date.split('T')[0] }} | {{ inv.due_date.split('T')[0] }} | {{ inv.payment_status }} |
          {% endfor -%}

      # Calls the script in script.yaml, not the service directly - a tile's
      # tap_action doesn't template its `data:` fields, so figuring out
      # "which invoice that index maps to" has to happen in a script
      # instead. A plain static value like `invoice_index: 1` below is fine
      # though - it's only a Jinja *expression* in tap_action data that
      # doesn't get evaluated, not literal data.
      #
      # One tile per recent invoice (matching the Invoices table above,
      # most recent first) rather than just the latest - add or remove
      # entries here to match how many invoices you want downloadable at a
      # glance.
      - type: grid
        columns: 4
        square: false
        cards:
          - type: tile
            entity: sensor.exempelgatan_1_exempelstad_latest_invoice
            name: Invoice 1 (latest)
            icon: mdi:file-pdf-box
            tap_action:
              action: perform-action
              perform_action: script.download_vafab_invoice
              data:
                invoice_index: 0
          - type: tile
            entity: sensor.exempelgatan_1_exempelstad_latest_invoice
            name: Invoice 2
            icon: mdi:file-pdf-box
            tap_action:
              action: perform-action
              perform_action: script.download_vafab_invoice
              data:
                invoice_index: 1
          - type: tile
            entity: sensor.exempelgatan_1_exempelstad_latest_invoice
            name: Invoice 3
            icon: mdi:file-pdf-box
            tap_action:
              action: perform-action
              perform_action: script.download_vafab_invoice
              data:
                invoice_index: 2
          - type: tile
            entity: sensor.exempelgatan_1_exempelstad_latest_invoice
            name: Invoice 4
            icon: mdi:file-pdf-box
            tap_action:
              action: perform-action
              perform_action: script.download_vafab_invoice
              data:
                invoice_index: 3

      - type: entities
        title: Contract fees
        icon: mdi:cash-multiple
        entities:
          - entity: sensor.exempelgatan_1_exempelstad_fast_grundavgift_smahus

      - type: entities
        title: Orders & complaints
        icon: mdi:clipboard-list-outline
        entities:
          - entity: sensor.exempelgatan_1_exempelstad_available_orders
          - entity: sensor.exempelgatan_1_exempelstad_available_complaints
