# Example automations built on the VafabMiljö entities. This integration
# never sends notifications or controls anything itself - the per-bin-type
# "X tomorrow" binary sensors, the Notification time entity, and the Latest
# invoice sensor are just the building blocks; what you do with them (a
# notify service call, a light, both) is entirely up to your own
# automations.
#
# Replace the entity IDs with your own - see dashboard.yaml for how to find
# them.

# One toggle per person per notification type, rather than an all-or-nothing
# switch - each automation below checks the relevant toggle before calling
# that person's notify service, so a household can decide individually who
# gets pinged about what. Add via Settings -> Devices & services -> Helpers
# -> Add helper -> Toggle (or paste this block in as-is if you're editing
# YAML directly). Replace "person_a"/"person_b" with your household's names.
input_boolean:
  notify_person_a_pickup_reminder:
    name: "Person A: waste pickup reminder"
    icon: mdi:bell-outline
  notify_person_a_new_invoice:
    name: "Person A: new invoice"
    icon: mdi:file-document-outline
  notify_person_b_pickup_reminder:
    name: "Person B: waste pickup reminder"
    icon: mdi:bell-outline
  notify_person_b_new_invoice:
    name: "Person B: new invoice"
    icon: mdi:file-document-outline

automation:
  # A phone notification independent of (and possibly at a different time
  # than) the app's own reminder.
  #
  # Trigger is time_pattern + a template condition, not a plain `platform:
  # time` with `at:` pointing at the Notification time entity - HA's time
  # trigger only accepts entities from the `input_datetime` or `sensor`
  # domain for a dynamic `at:`, not the `time` domain this integration's
  # Notification time entity actually is. Pointing `at:` straight at it
  # parses fine in the UI but fails schema validation at runtime, silently
  # leaving the automation permanently "unavailable" - confirmed live.
  - alias: "VafabMiljö - notify about tomorrow's pickup"
    trigger:
      - platform: time_pattern
        minutes: "*"
    condition:
      - condition: template
        value_template: >-
          {{ now().strftime('%H:%M') == states('time.exempelgatan_1_exempelstad_notification_time')[0:5] }}
      - condition: or
        conditions:
          - condition: state
            entity_id: binary_sensor.exempelgatan_1_exempelstad_matavfall_tomorrow
            state: "on"
          - condition: state
            entity_id: binary_sensor.exempelgatan_1_exempelstad_restavfall_tomorrow
            state: "on"
          - condition: state
            entity_id: binary_sensor.exempelgatan_1_exempelstad_plast_och_papper_tomorrow
            state: "on"
    action:
      - if:
          - condition: state
            entity_id: input_boolean.notify_person_a_pickup_reminder
            state: "on"
        then:
          - service: notify.mobile_app_person_a_phone
            data:
              title: "Waste collection tomorrow"
              message: "Remember to put the bins out tonight."
      - if:
          - condition: state
            entity_id: input_boolean.notify_person_b_pickup_reminder
            state: "on"
        then:
          - service: notify.mobile_app_person_b_phone
            data:
              title: "Waste collection tomorrow"
              message: "Remember to put the bins out tonight."

  # Fires when VafabMiljö issues a new invoice, rather than only ever
  # checking on your own schedule. `invoice_count` only goes up when a new
  # invoice actually appears - the invoice amount alone isn't a safe trigger
  # since two invoices can coincidentally have the same amount.
  - alias: "VafabMiljö - notify about new invoice"
    trigger:
      - platform: state
        entity_id: sensor.exempelgatan_1_exempelstad_latest_invoice
        attribute: invoice_count
    action:
      - if:
          - condition: state
            entity_id: input_boolean.notify_person_a_new_invoice
            state: "on"
        then:
          - service: notify.mobile_app_person_a_phone
            data:
              title: "New invoice from VafabMiljö"
              message: >-
                SEK {{ state_attr('sensor.exempelgatan_1_exempelstad_latest_invoice', 'invoices')[0].amount }}
                - due {{ state_attr('sensor.exempelgatan_1_exempelstad_latest_invoice', 'invoices')[0].due_date.split('T')[0] }}
      - if:
          - condition: state
            entity_id: input_boolean.notify_person_b_new_invoice
            state: "on"
        then:
          - service: notify.mobile_app_person_b_phone
            data:
              title: "New invoice from VafabMiljö"
              message: >-
                SEK {{ state_attr('sensor.exempelgatan_1_exempelstad_latest_invoice', 'invoices')[0].amount }}
                - due {{ state_attr('sensor.exempelgatan_1_exempelstad_latest_invoice', 'invoices')[0].due_date.split('T')[0] }}

  # A different light color per bin type - one automation per type, each
  # gated on that type's own "tomorrow" binary sensor. All three can fire
  # the same evening if more than one bin is due; order them so the one
  # you'd rather notice last runs last, or use different lights entirely.
  - alias: "VafabMiljö - light cue for Restavfall tomorrow"
    trigger:
      - platform: time
        at: time.exempelgatan_1_exempelstad_notification_time
    condition:
      - condition: state
        entity_id: binary_sensor.exempelgatan_1_exempelstad_restavfall_tomorrow
        state: "on"
    action:
      - service: light.turn_on
        target:
          entity_id: light.hallway
        data:
          color_name: red

  - alias: "VafabMiljö - light cue for Matavfall tomorrow"
    trigger:
      - platform: time
        at: time.exempelgatan_1_exempelstad_notification_time
    condition:
      - condition: state
        entity_id: binary_sensor.exempelgatan_1_exempelstad_matavfall_tomorrow
        state: "on"
    action:
      - service: light.turn_on
        target:
          entity_id: light.hallway
        data:
          color_name: green

  - alias: "VafabMiljö - light cue for Plast och papper tomorrow"
    trigger:
      - platform: time
        at: time.exempelgatan_1_exempelstad_notification_time
    condition:
      - condition: state
        entity_id: binary_sensor.exempelgatan_1_exempelstad_plast_och_papper_tomorrow
        state: "on"
    action:
      - service: light.turn_on
        target:
          entity_id: light.hallway
        data:
          color_name: blue
